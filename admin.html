<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fsTV Remote Command</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 600px; margin: 30px auto; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9rem; color: #555; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-group { display: grid; grid-template-columns: 1fr 3fr; gap: 10px; margin-top: 25px; }
        button { padding: 12px; cursor: pointer; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; transition: 0.2s; }
        .btn-push { background: #24292e; color: #fff; }
        .btn-push:hover { background: #000; }
        .btn-load { background: #e2e2e2; color: #333; font-size: 0.8rem; }
        .btn-load:hover { background: #d0d0d0; }
        #status { margin-top: 20px; padding: 10px; border-radius: 6px; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>fsTV Command Center</h2>
    
    <label>GitHub API Key (PAT)</label>
    <input type="password" id="githubToken" placeholder="github_pat_...">

    <label>Primary Stream URL</label>
    <input type="text" id="stream_url" placeholder="https://...">

    <label>Fallback Stream URL</label>
    <input type="text" id="fallback_url" placeholder="https://...">

    <label>Title</label>
    <input type="text" id="title" placeholder="TV">

    <label>User-Agent (UA)</label>
    <input type="text" id="ua" value="AppleCoreMedia/1.0.0.19L346 (Apple TV; U; CPU OS 15_4 like Mac OS X; en_us)">

    <div class="grid">
        <div>
            <label>Buffer (Sec)</label>
            <input type="number" id="buffer" value="15">
        </div>
        <div>
            <label>Start Delay (Sec)</label>
            <input type="number" id="start_buffer" value="2.5" step="0.5">
        </div>
    </div>

    <label>Poll Frequency (Sec)</label>
    <input type="number" id="poll_sec" value="30">

    <div class="btn-group">
        <button class="btn-load" onclick="loadCurrentConfig()">Load Current</button>
        <button class="btn-push" onclick="updateConfig()">Push Updates to App</button>
    </div>

    <div id="status"></div>
</div>

<script>
    const owner = 'hadot'; 
    const repo = 'hadot.github.io';        
    const path = 'watch.json';

    // Helper to show status messages
    function showStatus(text, color, bg) {
        const statusDiv = document.getElementById('status');
        statusDiv.style.display = "block";
        statusDiv.innerText = text;
        statusDiv.style.color = color || "#333";
        statusDiv.style.background = bg || "#eef";
    }

    // NEW: Function to pull existing data so you don't overwrite with defaults
    async function loadCurrentConfig() {
        const token = document.getElementById('githubToken').value;
        if (!token) return alert("Enter API Key first");

        try {
            const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const data = await response.json();
                const config = JSON.parse(atob(data.content));
                
                document.getElementById('stream_url').value = config.stream_url || "";
                document.getElementById('fallback_url').value = config.fallback_url || "";
                document.getElementById('title').value = config.title || "";
                document.getElementById('ua').value = config.ua || "";
                document.getElementById('buffer').value = config.buffer || 15;
                document.getElementById('start_buffer').value = config.start_buffer || 2.5;
                document.getElementById('poll_sec').value = config.poll_sec || 30;
                
                showStatus("Current config loaded successfully", "#155724", "#d4edda");
            }
        } catch (e) {
            showStatus("Failed to load current config: " + e.message, "#721c24", "#f8d7da");
        }
    }

    async function updateConfig() {
        const token = document.getElementById('githubToken').value;
        
        if (!token) {
            alert("Enter your GitHub API key first.");
            return;
        }

        showStatus("Syncing with GitHub...", "#333", "#eef");

        try {
            // 1. Get SHA of the current file
            let sha = null;
            const getResponse = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (getResponse.ok) {
                const data = await getResponse.json();
                sha = data.sha;
            }

            // 2. Build the JSON object with TWO links
            const config = {
                stream_url: document.getElementById('stream_url').value,
                fallback_url: document.getElementById('fallback_url').value,
                ua: document.getElementById('ua').value,
                buffer: parseInt(document.getElementById('buffer').value),
                start_buffer: parseFloat(document.getElementById('start_buffer').value),
                poll_sec: parseInt(document.getElementById('poll_sec').value),
                title: document.getElementById('title').value
            };

            const encodedContent = btoa(unescape(encodeURIComponent(JSON.stringify(config, null, 2))));

            // 3. Push to GitHub
            const putResponse = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Remote Config Update: ${config.title}`,
                    content: encodedContent,
                    sha: sha
                })
            });

            if (putResponse.ok) {
                showStatus("🚀 Config Pushed! App will update in ~1-2 mins.", "#155724", "#d4edda");
            } else {
                const err = await putResponse.json();
                showStatus("Error: " + err.message, "#721c24", "#f8d7da");
            }
        } catch (e) {
            showStatus("Network Error: " + e.message, "#721c24", "#f8d7da");
        }
    }
</script>

</body>
</html>
