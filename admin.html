<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fsTV Auth</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 600px; margin: 30px auto; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9rem; color: #555; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { width: 100%; margin-top: 20px; padding: 12px; cursor: pointer; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; transition: 0.2s; }
        .btn-push { background: #24292e; color: #fff; }
        .btn-auth { background: #007bff; color: white; }
        #admin-ui { display: none; } /* Hidden by default */
        #status { margin-top: 20px; padding: 10px; border-radius: 6px; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>

<div id="auth-ui" class="card">
    <h2>fsTV Login</h2>
    <label>GitHub API Key (PAT)</label>
    <input type="password" id="githubToken" placeholder="github_pat_...">
    <button class="btn-auth" onclick="validateKey()">Unlock Command Center</button>
</div>

<div id="admin-ui" class="card">
    <h2>fsTV Command Center</h2>
    
    <label>Stream URL (Primary)</label>
    <input type="text" id="stream_url" placeholder="https://link-1.m3u8">

    <label>Stream URL 2</label>
    <input type="text" id="stream_url_2" placeholder="https://link-2.m3u8">

    <div class="grid">
        <div>
            <label>Title</label>
            <input type="text" id="title" placeholder="Channel 1">
        </div>
        <div>
            <label>Title 2</label>
            <input type="text" id="title_2" placeholder="Channel 2">
        </div>
    </div>

    <label>User-Agent (UA)</label>
    <input type="text" id="ua">

    <div class="grid">
        <div>
            <label>Buffer (Sec)</label>
            <input type="number" id="buffer" step="0.5">
        </div>
        <div>
            <label>Start Delay (Sec)</label>
            <input type="number" id="start_buffer" step="0.5">
        </div>
    </div>

    <label>Poll Frequency (Sec)</label>
    <input type="number" id="poll_sec">

    <button class="btn-push" onclick="updateConfig()">Push Updates</button>
</div>

<div id="status"></div>

<script>
    const owner = 'hadot'; 
    const repo = 'hadot.github.io';        
    const path = 'watch.json';

    function showStatus(text, color, bg) {
        const statusDiv = document.getElementById('status');
        statusDiv.style.display = "block";
        statusDiv.innerText = text;
        statusDiv.style.color = color || "#333";
        statusDiv.style.background = bg || "#eef";
    }

    // Step 1: Validate key and pull data
    async function validateKey() {
        const token = document.getElementById('githubToken').value;
        if (!token) return alert("Enter API Key");

        showStatus("Authenticating...", "#333", "#eef");

        try {
            const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                const data = await response.json();
                const config = JSON.parse(atob(data.content));
                
                // Fill fields
                document.getElementById('stream_url').value = config.stream_url || "";
                document.getElementById('stream_url_2').value = config.stream_url_2 || "";
                document.getElementById('title').value = config.title || "";
                document.getElementById('title_2').value = config.title_2 || "";
                document.getElementById('ua').value = config.ua || "";
                document.getElementById('buffer').value = config.buffer || 15;
                document.getElementById('start_buffer').value = config.start_buffer || 2.5;
                document.getElementById('poll_sec').value = config.poll_sec || 30;

                // Toggle UI
                document.getElementById('auth-ui').style.display = "none";
                document.getElementById('admin-ui').style.display = "block";
                showStatus("Access Granted", "#155724", "#d4edda");
                setTimeout(() => { document.getElementById('status').style.display = "none"; }, 2000);
            } else {
                showStatus("Invalid Key or Repo Not Found", "#721c24", "#f8d7da");
            }
        } catch (e) {
            showStatus("Connection Error: " + e.message, "#721c24", "#f8d7da");
        }
    }

    // Step 2: Push Updates
    async function updateConfig() {
        const token = document.getElementById('githubToken').value;
        showStatus("Updating...", "#333", "#eef");

        try {
            let sha = null;
            const getResponse = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (getResponse.ok) {
                const data = await getResponse.json();
                sha = data.sha;
            }

            const config = {
                stream_url: document.getElementById('stream_url').value,
                stream_url_2: document.getElementById('stream_url_2').value,
                ua: document.getElementById('ua').value,
                buffer: parseFloat(document.getElementById('buffer').value),
                start_buffer: parseFloat(document.getElementById('start_buffer').value),
                poll_sec: parseInt(document.getElementById('poll_sec').value),
                title: document.getElementById('title').value,
                title_2: document.getElementById('title_2').value
            };

            const encodedContent = btoa(unescape(encodeURIComponent(JSON.stringify(config, null, 2))));

            const putResponse = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Update: ${config.title}`, content: encodedContent, sha: sha })
            });

            if (putResponse.ok) {
                showStatus("🚀 Success! App updating...", "#155724", "#d4edda");
            } else {
                const err = await putResponse.json();
                showStatus("Error: " + err.message, "#721c24", "#f8d7da");
            }
        } catch (e) {
            showStatus("Network Error: " + e.message, "#721c24", "#f8d7da");
        }
    }
</script>
</body>
</html>
