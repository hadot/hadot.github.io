<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fsTV Remote Command</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 600px; margin: 30px auto; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9rem; color: #555; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { width: 100%; margin-top: 25px; padding: 12px; cursor: pointer; background: #24292e; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; }
        button:hover { background: #000; }
        #status { margin-top: 20px; padding: 10px; border-radius: 6px; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>fsTV Command Center</h2>
    
    <label>GitHub API Key (PAT)</label>
    <input type="password" id="githubToken" placeholder="github_pat_...">

    <label>Stream URL</label>
    <input type="text" id="stream_url" placeholder="https://...">

    <label>Title</label>
    <input type="text" id="title" placeholder="TV">

    <label>User-Agent (UA)</label>
    <input type="text" id="ua" value="AppleCoreMedia/1.0.0.19L346 (Apple TV; U; CPU OS 15_4 like Mac OS X; en_us)">

    <div class="grid">
        <div>
            <label>Buffer (Sec)</label>
            <input type="number" id="buffer" value="15">
        </div>
        <div>
            <label>Start Delay (Sec)</label>
            <input type="number" id="start_buffer" value="2.5" step="0.5">
        </div>
    </div>

    <label>Poll Frequency (Sec)</label>
    <input type="number" id="poll_sec" value="30">

    <button onclick="updateConfig()">Push Updates to App</button>

    <div id="status"></div>
</div>

<script>
    const owner = 'hadot'; 
    const repo = 'hadot.github.io';        
    const path = 'watch.json';

    async function updateConfig() {
        const token = document.getElementById('githubToken').value;
        const statusDiv = document.getElementById('status');
        
        if (!token) {
            alert("Enter your GitHub API key first.");
            return;
        }

        statusDiv.style.display = "block";
        statusDiv.innerText = "Syncing with GitHub...";
        statusDiv.style.background = "#eef";

        try {
            // 1. Get SHA of the current file
            let sha = null;
            const getResponse = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (getResponse.ok) {
                const data = await getResponse.json();
                sha = data.sha;
            }

            // 2. Build the JSON object
            const config = {
                stream_url: document.getElementById('stream_url').value,
                ua: document.getElementById('ua').value,
                buffer: parseInt(document.getElementById('buffer').value),
                start_buffer: parseFloat(document.getElementById('start_buffer').value),
                poll_sec: parseInt(document.getElementById('poll_sec').value),
                title: document.getElementById('title').value
            };

            const encodedContent = btoa(JSON.stringify(config, null, 2));

            // 3. Push to GitHub
            const putResponse = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                method: 'PUT',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: `Remote Config Update: ${config.title}`,
                    content: encodedContent,
                    sha: sha
                })
            });

            if (putResponse.ok) {
                statusDiv.innerText = "🚀 Config Pushed! App will update in ~1-2 mins.";
                statusDiv.style.background = "#d4edda";
                statusDiv.style.color = "#155724";
            } else {
                const err = await putResponse.json();
                statusDiv.innerText = "Error: " + err.message;
                statusDiv.style.background = "#f8d7da";
            }
        } catch (e) {
            statusDiv.innerText = "Network Error: " + e.message;
        }
    }
</script>

</body>
</html>
