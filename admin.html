<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalyst Control Center</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 750px; margin: 20px auto; padding: 15px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #333; border-bottom: 2px solid #eee; padding-bottom: 8px; margin-bottom: 15px; font-size: 1.3rem; }
        
        label { display: block; margin-top: 8px; font-weight: bold; font-size: 0.8rem; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type="text"], input[type="password"], input[type="file"] { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 0.9rem; }
        
        /* Layout Grids */
        .stream-block { background: #fcfcfc; border: 1px solid #eee; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .stream-block h3 { margin-top: 0; margin-bottom: 10px; font-size: 1rem; color: #444; border-bottom: 2px solid #f4f4f4; padding-bottom: 5px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 2.5fr; gap: 15px; align-items: end; margin-bottom: 10px; }
        .grid-headers { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; align-items: end; }
        
        button { width: 100%; margin-top: 15px; padding: 10px; cursor: pointer; border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; transition: 0.2s; }
        .btn-push { background: #24292e; color: #fff; }
        .btn-push:hover { background: #1b1f23; }
        .btn-auth { background: #007bff; color: white; }
        .btn-auth:hover { background: #0056b3; }
        
        /* M3U Quick Add Styles */
        .m3u-toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        .m3u-toolbar > * { flex: 1; min-width: 150px; margin: 0; }
        .radio-group { display: flex; justify-content: space-around; background: #f8f9fa; padding: 8px; border-radius: 6px; border: 1px solid #eee; height: 35px; align-items: center; box-sizing: border-box; }
        .radio-group label { margin: 0; font-weight: normal; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 0.85rem; text-transform: none; }
        
        .quick-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 6px; max-height: 200px; overflow-y: auto; padding: 8px; background: #fafafa; border: 1px solid #ddd; border-radius: 6px; }
        .btn-quick { margin-top: 0; padding: 6px; font-size: 0.8rem; background: #fff; border: 1px solid #ccc; color: #333; border-radius: 4px; font-weight: normal; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-quick:hover { background: #e9ecef; border-color: #adb5bd; }

        #admin-ui, #filter-channels { display: none; }
        #status { margin-top: 15px; padding: 10px; border-radius: 6px; font-size: 0.9rem; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="auth-ui" class="card">
    <input type="password" id="githubToken" placeholder="Enter GitHub Token...">
    <button class="btn-auth" onclick="validateKey()">big blue button</button>
</div>

<div id="admin-ui" class="card">
    <h2>CATALYST CONTROL CENTER</h2>
    
    <!-- SLOT 1 -->
    <div class="stream-block">
        <h3>Slot 1 (Primary)</h3>
        <div class="grid-2">
            <div><label>Title</label><input type="text" id="title" placeholder="Channel 1"></div>
            <div><label>Stream URL</label><input type="text" id="stream_url" placeholder="https://link-1.m3u8"></div>
        </div>
        <div class="grid-headers">
            <div><label>User-Agent</label><input type="text" id="ua" placeholder="Mozilla/5.0..."></div>
            <div><label>Referer</label><input type="text" id="referer" placeholder="https://example.com/"></div>
        </div>
    </div>

    <!-- SLOT 2 -->
    <div class="stream-block">
        <h3>Slot 2</h3>
        <div class="grid-2">
            <div><label>Title</label><input type="text" id="title_2" placeholder="Channel 2"></div>
            <div><label>Stream URL</label><input type="text" id="stream_url_2" placeholder="https://link-2.m3u8"></div>
        </div>
        <div class="grid-headers">
            <div><label>User-Agent</label><input type="text" id="ua_2" placeholder="Mozilla/5.0..."></div>
            <div><label>Referer</label><input type="text" id="referer_2" placeholder="https://example.com/"></div>
        </div>
    </div>

    <!-- SLOT 3 -->
    <div class="stream-block">
        <h3>Slot 3</h3>
        <div class="grid-2">
            <div><label>Title</label><input type="text" id="title_3" placeholder="Channel 3"></div>
            <div><label>Stream URL</label><input type="text" id="stream_url_3" placeholder="https://link-3.m3u8"></div>
        </div>
        <div class="grid-headers">
            <div><label>User-Agent</label><input type="text" id="ua_3" placeholder="Mozilla/5.0..."></div>
            <div><label>Referer</label><input type="text" id="referer_3" placeholder="https://example.com/"></div>
        </div>
    </div>

    <button class="btn-push" onclick="updateConfig()">Push Updates to App</button>

    <div style="margin-top: 20px; border-top: 2px solid #eee; padding-top: 15px;">
        <div class="m3u-toolbar">
            <input type="file" id="m3u-upload" accept=".m3u,.m3u8" onchange="handleFileUpload(event)">
            <input type="text" id="filter-channels" placeholder="Search channels..." onkeyup="filterChannels()">
            <div class="radio-group">
                <label><input type="radio" name="targetSlot" value="1" checked> Slot 1</label>
                <label><input type="radio" name="targetSlot" value="2"> Slot 2</label>
                <label><input type="radio" name="targetSlot" value="3"> Slot 3</label>
            </div>
        </div>
        
        <div class="quick-grid" id="quick-add-container">
            <p style="grid-column: 1 / -1; color: #888; font-size: 0.85rem; text-align: center; margin: 15px 0;">Upload an M3U file to extract channels</p>
        </div>
    </div>
</div>

<div id="status"></div>

<script>
    const owner = 'hadot'; 
    const repo = 'hadot.github.io';        
    const path = 'watch.json';

    let globalChannels = []; 

    window.onload = function() {
        const savedToken = localStorage.getItem('catalyst_token');
        if (savedToken) {
            document.getElementById('githubToken').value = savedToken;
            validateKey(); 
        }
    };

    function parseM3U(content) {
        const lines = content.split('\n');
        const channels = [];
        let currentName = '';

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (line.startsWith('#EXTINF:')) {
                const parts = line.split(',');
                currentName = parts.length > 1 ? parts.slice(1).join(',').trim() : 'Unknown Channel';
            } else if (line !== '' && !line.startsWith('#')) {
                if (currentName) {
                    channels.push({ name: currentName, url: line });
                    currentName = ''; 
                }
            }
        }
        return channels;
    }

    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        showStatus("Reading M3U file...", "#004085", "#cce5ff");

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            globalChannels = parseM3U(content);
            
            if(globalChannels.length > 0) {
                document.getElementById('filter-channels').style.display = 'block';
                renderChannelList(globalChannels);
                showStatus(`Loaded ${globalChannels.length} channels`, "#155724", "#d4edda");
            } else {
                showStatus("No valid channels found in file.", "#721c24", "#f8d7da");
            }
            
            setTimeout(() => { document.getElementById('status').style.display = "none"; }, 2500);
        };
        reader.readAsText(file);
    }

    function renderChannelList(channels) {
        const container = document.getElementById('quick-add-container');
        container.innerHTML = ''; 

        if(channels.length === 0) {
            container.innerHTML = '<p style="grid-column: 1 / -1; color: #888; text-align: center; font-size: 0.85rem;">No matching channels.</p>';
            return;
        }

        const renderLimit = Math.min(channels.length, 300);
        
        for(let i = 0; i < renderLimit; i++) {
            const ch = channels[i];
            const btn = document.createElement('button');
            btn.className = 'btn-quick';
            btn.innerText = ch.name;
            btn.title = ch.url; 
            btn.onclick = () => fillSlot(ch.name, ch.url);
            container.appendChild(btn);
        }

        if(channels.length > 300) {
            const msg = document.createElement('p');
            msg.style.cssText = "grid-column: 1 / -1; color: #888; text-align: center; font-size: 0.8rem; margin-top: 10px;";
            msg.innerText = `+ ${channels.length - 300} more (use search to find them)`;
            container.appendChild(msg);
        }
    }

    function filterChannels() {
        const query = document.getElementById('filter-channels').value.toLowerCase();
        const filtered = globalChannels.filter(ch => ch.name.toLowerCase().includes(query));
        renderChannelList(filtered);
    }

    function fillSlot(name, url) {
        const target = document.querySelector('input[name="targetSlot"]:checked').value;
        if (target === "1") {
            document.getElementById('title').value = name;
            document.getElementById('stream_url').value = url;
            showStatus(`Primary slot filled with ${name}`, "#004085", "#cce5ff");
        } else if (target === "2") {
            document.getElementById('title_2').value = name;
            document.getElementById('stream_url_2').value = url;
            showStatus(`Slot 2 filled with ${name}`, "#004085", "#cce5ff");
        } else {
            document.getElementById('title_3').value = name;
            document.getElementById('stream_url_3').value = url;
            showStatus(`Slot 3 filled with ${name}`, "#004085", "#cce5ff");
        }
        setTimeout(() => { document.getElementById('status').style.display = "none"; }, 1500);
    }

    function showStatus(text, color, bg) {
        const statusDiv = document.getElementById('status');
        statusDiv.style.display = "block";
        statusDiv.innerText = text;
        statusDiv.style.color = color || "#333";
        statusDiv.style.background = bg || "#eef";
    }

    async function validateKey() {
        const token = document.getElementById('githubToken').value;
        if (!token) return alert("big blue button");

        showStatus("hmmmm...", "#333", "#eef");

        try {
            const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                localStorage.setItem('catalyst_token', token);

                const data = await response.json();
                const config = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                
                document.getElementById('title').value = config.title || "";
                document.getElementById('stream_url').value = config.stream_url || "";
                document.getElementById('ua').value = config.ua || "";
                document.getElementById('referer').value = config.referer || "";
                
                document.getElementById('title_2').value = config.title_2 || "";
                document.getElementById('stream_url_2').value = config.stream_url_2 || "";
                document.getElementById('ua_2').value = config.ua_2 || "";
                document.getElementById('referer_2').value = config.referer_2 || "";

                document.getElementById('title_3').value = config.title_3 || "";
                document.getElementById('stream_url_3').value = config.stream_url_3 || "";
                document.getElementById('ua_3').value = config.ua_3 || "";
                document.getElementById('referer_3').value = config.referer_3 || "";

                document.getElementById('auth-ui').style.display = "none";
                document.getElementById('admin-ui').style.display = "block";
                
                showStatus("Access Granted", "#155724", "#d4edda");
                setTimeout(() => { document.getElementById('status').style.display = "none"; }, 2000);
            } else {
                localStorage.removeItem('catalyst_token');
                showStatus("sorry, invalid token or file not found", "#721c24", "#f8d7da");
            }
        } catch (e) {
            showStatus("Connection Error: " + e.message, "#721c24", "#f8d7da");
        }
    }

    async function updateConfig() {
        const token = document.getElementById('githubToken').value;
        showStatus("Pushing updates...", "#333", "#eef");

        try {
            // --- 1. PREPARE CONFIG DATA ---
            const config = {
                title: document.getElementById('title').value,
                stream_url: document.getElementById('stream_url').value,
                ua: document.getElementById('ua').value,
                referer: document.getElementById('referer').value,
                
                title_2: document.getElementById('title_2').value,
                stream_url_2: document.getElementById('stream_url_2').value,
                ua_2: document.getElementById('ua_2').value,
                referer_2: document.getElementById('referer_2').value,

                title_3: document.getElementById('title_3').value,
                stream_url_3: document.getElementById('stream_url_3').value,
                ua_3: document.getElementById('ua_3').value,
                referer_3: document.getElementById('referer_3').value
            };

            // --- 2. UPDATE JSON FILE ---
            let jsonSha = null;
            const getJsonResponse = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (getJsonResponse.ok) jsonSha = (await getJsonResponse.json()).sha;

            const encodedJson = btoa(unescape(encodeURIComponent(JSON.stringify(config, null, 2))));
            const putJsonResponse = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Update watch.json: ${config.title || 'Channels'}`, content: encodedJson, sha: jsonSha })
            });

            if (!putJsonResponse.ok) throw new Error("Failed to update watch.json");

            // --- 3. BUILD AND UPDATE 1.m3u ---
            if (config.stream_url) {
                let m3u1Content = `#EXTM3U\n#EXTINF:-1, ${config.title || 'Channel 1'}\n${config.stream_url}\n`;
                let m3u1Sha = null;
                const getM3u1Response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/1.m3u`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (getM3u1Response.ok) m3u1Sha = (await getM3u1Response.json()).sha;

                const encodedM3u1 = btoa(unescape(encodeURIComponent(m3u1Content)));
                const putM3u1Response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/1.m3u`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Update 1.m3u: ${config.title || 'Channel 1'}`, content: encodedM3u1, sha: m3u1Sha })
                });
                if (!putM3u1Response.ok) throw new Error("Failed to update 1.m3u");
            }

            // --- 4. BUILD AND UPDATE 2.m3u ---
            if (config.stream_url_2) {
                let m3u2Content = `#EXTM3U\n#EXTINF:-1, ${config.title_2 || 'Channel 2'}\n${config.stream_url_2}\n`;
                let m3u2Sha = null;
                const getM3u2Response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/2.m3u`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (getM3u2Response.ok) m3u2Sha = (await getM3u2Response.json()).sha;

                const encodedM3u2 = btoa(unescape(encodeURIComponent(m3u2Content)));
                const putM3u2Response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/2.m3u`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Update 2.m3u: ${config.title_2 || 'Channel 2'}`, content: encodedM3u2, sha: m3u2Sha })
                });
                if (!putM3u2Response.ok) throw new Error("Failed to update 2.m3u");
            }

            // --- 5. BUILD AND UPDATE 3.m3u ---
            if (config.stream_url_3) {
                let m3u3Content = `#EXTM3U\n#EXTINF:-1, ${config.title_3 || 'Channel 3'}\n${config.stream_url_3}\n`;
                let m3u3Sha = null;
                const getM3u3Response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/3.m3u`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (getM3u3Response.ok) m3u3Sha = (await getM3u3Response.json()).sha;

                const encodedM3u3 = btoa(unescape(encodeURIComponent(m3u3Content)));
                const putM3u3Response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/3.m3u`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Update 3.m3u: ${config.title_3 || 'Channel 3'}`, content: encodedM3u3, sha: m3u3Sha })
                });
                if (!putM3u3Response.ok) throw new Error("Failed to update 3.m3u");
            }

            // --- 6. SUCCESS ---
            showStatus("🚀 Success! Data and M3U files updated.", "#155724", "#d4edda");
            setTimeout(() => { document.getElementById('status').style.display = "none"; }, 3000);

        } catch (e) {
            showStatus("Error: " + e.message, "#721c24", "#f8d7da");
        }
    }
</script>
</body>
</html>
